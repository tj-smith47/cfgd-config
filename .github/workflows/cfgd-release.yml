# Auto-generated by cfgd — manages release tagging for modules and profiles.
# Regenerate with: cfgd workflow generate --force
name: cfgd Release

on:
  push:
    branches: [master]
    paths:
      - 'modules/nvim/**'

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      module_nvim: ${{ steps.changes.outputs.module_nvim }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD)
          fi
          if echo "$CHANGED" | grep -q '^modules/nvim/'; then
            echo "module_nvim=true" >> $GITHUB_OUTPUT
          else
            echo "module_nvim=false" >> $GITHUB_OUTPUT
          fi

  tag-modules:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        include:
          - name: nvim
            changed: ${{ needs.detect-changes.outputs.module_nvim }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'
        with:
          fetch-depth: 0
      - name: Read module version
        if: matrix.changed == 'true'
        id: version
        run: |
          VERSION=$(grep -oP 'version:\s*"?\K[^"\s]+' "modules/${{ matrix.name }}/module.yaml" || echo "0.1.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Tag module release
        if: matrix.changed == 'true'
        run: |
          TAG="${{ matrix.name }}/v${{ steps.version.outputs.version }}"
          git tag -f "$TAG"
          git push origin "$TAG" --force
